name: Deploy Main to GCP

on:
  push:
    branches: [devv]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          # Khuyên dùng biến để dễ quản lý thay vì ghi cứng tên app
          PM2_NAME: ${{ vars.PM2_NAME }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            
            cd /home/quynhnhutran987/nana-devops || { echo "Directory not found"; exit 1; }
            
            git fetch origin devv
            git reset --hard origin/devv
            
            rm -rf node_modules
            npm install --production --no-audit --no-fund
        
            pm2 delete "$PM2_NAME" || true
            pm2 start app.mjs --name "$PM2_NAME"
            pm2 save
            
            echo "Done!"
          EOF